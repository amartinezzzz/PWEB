<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 5 - PWEB</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, rgb(214, 81, 214), rgb(199, 172, 199));
    }

    .container {
      width: 500px;
      height: 500px;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    h2 {
      font-size: 2rem;
      color: white;
      position: relative;
    }

    h2::before {
      content: "Cinza";
    }

    @media (max-width: 420px) {
      .container {
        background-color: gray;
      }

      h2::before {
        content: "Cinza";
      }
    }

    @media (min-width: 421px) and (max-width: 768px) {
      .container {
        background-color: rgb(255, 116, 2);
      }

      h2::before {
        content: "Laranja";
      }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .container {
        background-color: rgb(255, 36, 138);
      }

      h2::before {
        content: "Rosa";
      }
    }

    @media (min-width: 1025px) and (max-width: 1365px) {
      .container {
        background-color: red;
      }

      h2::before {
        content: "Vermelho";
      }
    }

    @media (min-width: 1366px) and (max-width: 1919px) {
      .container {
        background-color: rgb(214, 11, 214);
      }

      h2::before {
        content: "Roxo";
      }
    }

    @media (width: 1920px) {
      .container {
        background-color: yellow;
      }

      h2::before {
        content: "Amarelo";
      }
    }

    @media (min-width: 1921px) {
      .container {
        background-color: rgb(15, 226, 15);
      }

      h2::before {
        content: "Verde";
      }
    }

  </style>
</head>

<body>
  <div class="container">
    <h2></h2>
  </div>
</body>
</html>
